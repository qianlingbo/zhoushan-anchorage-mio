name: 更新锚地供油指数数据

on:
  schedule:
    # UTC 时间，北京时间 = UTC+8
    # 北京 10:00 = UTC 02:00
    # 北京 16:00 = UTC 08:00
    - cron: '0 2 * * *'
    - cron: '0 8 * * *'
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install requests

      - name: 抓取最新数据
        run: python3 scripts/update_data.py

      - name: 提交并推送
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "数据无变化，跳过提交"
          else
            git commit -m "🔄 自动更新 MIO 数据 $(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M')"
            git push
          fi
