name: Update Data

on:
  schedule:
    # GitHub cron uses UTC. Two checks are queued inside each 3-hour
    # Asia/Shanghai window; the script writes at most once per window.
    - cron: "37,57 1,4,7,10,13,16,19,22 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: anchorage-data-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      TZ: Asia/Shanghai
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip requests

      - name: Update anchorage data
        run: |
          WINDOW_ARGS=""
          if [ "${{ github.event_name }}" = "schedule" ]; then
            WINDOW_ARGS="--skip-current-window"
          fi

          for attempt in 1 2 3; do
            if python scripts/update_data.py --no-cache-on-failure $WINDOW_ARGS; then
              exit 0
            fi

            if [ "$attempt" = "3" ]; then
              break
            fi

            echo "Data source unavailable, retrying in 5 minutes..."
            sleep 300
          done

          echo "Data source still unavailable; keeping cached data and recording this check."
          python scripts/update_data.py --cache-only $WINDOW_ARGS

      - name: Commit and push data changes
        run: |
          if git diff --quiet -- data/latest.json data/data.js; then
            echo "No data changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest.json data/data.js
          git commit -m "auto update data"
          git push
