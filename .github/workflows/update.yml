name: Update Data

on:
  schedule:
    - cron: "22 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: anchorage-data-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      TZ: Asia/Shanghai
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip requests

      - name: Update anchorage data
        run: |
          for attempt in 1 2; do
            if python scripts/update_data.py; then
              exit 0
            fi

            echo "Data source unavailable, retrying in 90 seconds..."
            sleep 90
          done

          python scripts/update_data.py

      - name: Commit and push data changes
        run: |
          if git diff --quiet -- data/latest.json data/data.js; then
            echo "No data changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest.json data/data.js
          git commit -m "auto update data"
          git push
